<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a calm woman with soft natural lighting and a neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6xTbUiKN-EGVz1acUU5rR_DaO7PU16SKUzg0-J0CYTgmNMiha5y89HE-0vn3FV5tCvQs0fpICyQHW8I1UYGi0hlfIXS4SS9nPcmJoaP9S9su3kxAc6n0QvtmLWq69W_ykIrMlZNkQfqUKfvwXEfE80iXLJX5jQt-HCPSwvN4wkBS_r__GZi2GSgWOV7mTKxpolEwuThVLLozgBv7ZQ5YbgiVz_sSsYQZbNA9-o_KuVDcg21xW7Ldz16sL6eA_iPx9dK12COBv9xs"/>
</div>
</div>
<h1 class="text-xl font-bold text-[#373831] dark:text-[#fcf9f3] font-['Plus_Jakarta_Sans'] font-semibold tracking-tight">Sanctuary</h1>
<button class="material-symbols-outlined text-[#64655c] dark:text-[#babaaf] hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors p-2 rounded-full">
            settings
        </button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 relative">
<!-- Subtle Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<div class="z-10 w-full max-w-sm flex flex-col items-center gap-12">
<!-- Timer & Status -->
<div class="text-center space-y-2">
<p class="font-headline text-5xl font-bold tracking-tight text-on-surface">00:45</p>
<div class="flex items-center justify-center gap-2">
<span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
<span class="text-on-surface-variant font-medium tracking-wide uppercase text-[10px]">Recording Session</span>
</div>
</div>
<!-- Waveform Visualization -->
<div class="flex items-end justify-center gap-1.5 h-32 w-full px-4">
<div class="waveform-bar bg-primary-container h-8"></div>
<div class="waveform-bar bg-primary h-16"></div>
<div class="waveform-bar bg-secondary-container h-12"></div>
<div class="waveform-bar bg-primary-container h-24"></div>
<div class="waveform-bar bg-primary h-32"></div>
<div class="waveform-bar bg-secondary h-20"></div>
<div class="waveform-bar bg-primary-container h-14"></div>
<div class="waveform-bar bg-primary-dim h-28"></div>
<div class="waveform-bar bg-primary-fixed-dim h-10"></div>

<div class="waveform-bar bg-primary-container h-24"></div>
<div class="waveform-bar bg-primary h-32"></div>
<div class="waveform-bar bg-secondary-container h-20"></div>
<div class="waveform-bar bg-primary-container h-14"></div>
<div class="waveform-bar bg-primary-dim h-28"></div>
<div class="waveform-bar bg-primary-fixed-dim h-10"></div>
<div class="waveform-bar bg-primary-container h-12"></div>
</div>
<!-- Glowing Record Button -->
<div class="relative flex items-center justify-center">
<!-- Pulse Layers -->
<div class="absolute w-32 h-32 bg-primary/10 rounded-full animate-ping opacity-20"></div>
<div class="absolute w-28 h-28 bg-primary/20 rounded-full animate-pulse opacity-40"></div>
<button class="relative w-24 h-24 bg-gradient-to-br from-primary to-primary-dim rounded-full shadow-xl shadow-primary/30 flex items-center justify-center text-white scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Focus Controls -->
<div class="flex items-center gap-6 w-full">
<button class="flex-1 py-4 px-8 rounded-full bg-surface-container-low text-on-surface-variant font-semibold hover:bg-surface-container-high transition-colors">
                    Pause
                </button>
<button class="flex-1 py-4 px-8 rounded-full bg-primary text-on-primary font-semibold shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity">
                    Finish
                </button>
